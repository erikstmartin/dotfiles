# -- general ------------------------------------------------------------------m
# Use tmux-256color as default, but preserve capabilities from outer terminal
set -g default-terminal "tmux-256color"
set -g default-shell "$SHELL"
set -g default-command "$SHELL -l"
set -as terminal-overrides ",xterm-ghostty:RGB,xterm-ghostty:Tc"
set -as terminal-features ",*:RGB"
set -g focus-events on

setw -g xterm-keys on
set -s escape-time 0                      # faster command sequences
set -sg repeat-time 0                     # set repeat timeout
set -s focus-events on

# Extended keys for modified key support (shift+enter, ctrl+i, etc.)
# Use 'always' to force extended keys even if app doesn't explicitly request them
set -s extended-keys on  # only send when app requests (was: always)
# Use CSI-u format for extended keys (compatible with Kitty protocol)
set -s extended-keys-format csi-u
# Mark terminal as supporting extended keys
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'xterm-ghostty:extkeys'
set -as terminal-features 'tmux*:extkeys'
# CRITICAL: Also mark these terminals as supporting extkeys in terminal-overrides
# This ensures tmux knows to pass through modified keys even without app query
set -as terminal-overrides ',xterm*:extkeys:Cr=\E]112\007:Cs=\E]12;%p1%s\007'
set -as terminal-overrides ',tmux*:extkeys:Cr=\E]112\007:Cs=\E]12;%p1%s\007'
set -g allow-passthrough on

#set -g prefix2 C-a                        # GNU-Screen compatible prefix
bind C-a send-prefix -2

set -q -g status-utf8 on                  # expect UTF-8 (tmux < 2.2)
setw -q -g utf8 on

set -g history-limit 5000                 # boost history

# Focus events enabled for terminals that support them
set -g focus-events on

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# vi keys in copy mode
setw -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

set -g copy-mode-match-style "bg=cyan,fg=black"
set -g copy-mode-current-match-style "bg=magenta,fg=black"

setw -g aggressive-resize on

bind C-q confirm-before -p "kill-session #S? (y/n)" kill-session
bind x kill-pane                                    # kill pane without confirmation
bind X kill-window                                  # kill window without confirmation
bind-key C-c command-prompt -p "Session name:" "new-session -d -s '%%' \; switch-client -t '%%'"
bind-key C-r command-prompt -p "Rename session:" "rename-session '%%'"
bind-key r command-prompt -p "Rename window:" "rename-window '%%'"

# session navigation (Shift-Tab)
bind BTab switch-client -l  # move to last session

# Native tmux choosers with search support (press '/' to filter)
bind s choose-tree -Zs
bind w choose-tree -Zw

# reload configuration
set-environment -g TMUX_PROGRAM "tmux"
set-environment -g TMUX_CONF "~/.tmux.conf"
run '"$TMUX_PROGRAM" -S #{socket_path} set-environment -g TMUX_SOCKET "#{socket_path}"'
bind M-r run '"$TMUX_PROGRAM" ${TMUX_SOCKET:+-S "$TMUX_SOCKET"} source "$TMUX_CONF"' \; display "#{TMUX_CONF} sourced"

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename off  # do not rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set-hook -g after-rename-window 'run-shell "~/dotfiles/bin/rename-with-icon.sh \"#{window_name}\" \"#{window_id}\""'

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 4000      # slightly longer status messages display time

set -g status-interval 5      # redraw status line every 10 seconds

# clear both screen and history
#bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# activity
set -g monitor-activity on
set -g visual-activity off


# -- navigation ----------------------------------------------------------------

# split current window horizontally
bind - split-window -v
# split current window vertically
bind _ split-window -h

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
unbind Left
unbind Down
unbind Up
unbind Right
unbind C-Up   
unbind C-Down 
unbind C-Left 
unbind C-Right

bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
bind -r n next-window       # select next window
bind -r p previous-window   # select previous window
bind Tab last-window        # move to last active window
bind -r C-h swap-window -t -1 \; select-window -t -1  # move window left
bind -r C-l swap-window -t +1 \; select-window -t +1  # move window right

# toggle mouse
set -g mouse on
# bind m run "cut -c3- '#{TMUX_CONF}' | sh -s _toggle_mouse"

# Zoom toggle
bind z resize-pane -Z
bind Enter resize-pane -Z

# -- buffers -------------------------------------------------------------------

bind C-b list-buffers    # list paste buffers
bind C-p paste-buffer -p # paste from the top paste buffer
bind C-P choose-buffer   # choose which buffer to paste from
bind v run-shell "pbpaste | tmux load-buffer - \; paste-buffer -d -p"


# -- popup windows -------------------------------------------------------------
# Main launcher menu
bind t run-shell "tmux display-popup -E -w 55% -h 70% '#{default-shell} -ilc \"sesh picker -i\"'"

set -g detach-on-destroy on   # detach when session is destroyed
bind Space display-menu -T "Launcher" \
  "Sesh"        T "display-popup -E -w 55% -h 70% '#{default-shell} -ilc \"sesh picker -i\"'" \
  "" \
  "Lazygit"     g "display-popup -d '#{pane_current_path}' -w 80% -h 80% -E '#{default-shell} -ilc lazygit'" \
  "Lazydocker"  d "display-popup -d '#{pane_current_path}' -w 80% -h 80% -E '#{default-shell} -ilc lazydocker'" \
  "K9s"         k "display-popup -d '#{pane_current_path}' -w 80% -h 80% -E k9s" \
  "gh-dash"     h "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E '#{default-shell} -ilc gh\\ dash'" \
  "Obsidian"    o "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E '#{default-shell} -ilc \"nvim \\\"`printenv OBSIDIAN_VAULT`\\\"\"'" \
  "AI Assistant" a "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E '#{default-shell} -ilc ai'" \
  "Terminal"    t "display-popup -d '#{pane_current_path}' -w 75% -h 75% -E zsh" \
   "" \
   "Config"      c "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'nvim ~/dotfiles'"

# Session management menu
bind S display-menu -T "Session Management" \
  "New Session"     c "command-prompt -p 'Session name:' 'new-session -d -s \"%%\" ; switch-client -t \"%%\"'" \
  "Rename Session"  r "command-prompt -p 'Rename session:' 'rename-session \"%%\"'" \
  "Kill Session"    q "confirm-before -p 'kill-session #S? (y/n)' kill-session" \
  "" \
  "Switch Session"  s "choose-session" \
  "Detach"          d "detach-client"

# Window management menu  
bind W display-menu -T "Window Management" \
  "New Window"      n "new-window -c '#{pane_current_path}'" \
  "Rename Window"   r "command-prompt -p 'Rename window:' 'rename-window \"%%\"'" \
  "Kill Window"     k "confirm-before -p 'kill-window #W? (y/n)' kill-window" \
  "" \
  "Split Vertical"   v "split-window -h -c '#{pane_current_path}'" \
  "Split Horizontal" s "split-window -v -c '#{pane_current_path}'" \
  "" \
  "Move Left"        h "swap-window -t -1" \
  "Move Right"       l "swap-window -t +1" \
  "" \
  "Choose Window"    w "choose-window"

# Pane management menu
bind P display-menu -T "Pane Management" \
  "Split Vertical"   v "split-window -h -c '#{pane_current_path}'" \
  "Split Horizontal" s "split-window -v -c '#{pane_current_path}'" \
  "" \
  "Kill Pane"        x "confirm-before -p 'kill-pane? (y/n)' kill-pane" \
  "Break Pane"       b "break-pane" \
  "" \
  "Swap Up"          k "swap-pane -U" \
  "Swap Down"        j "swap-pane -D" \
  "Swap Left"        h "swap-pane -L" \
  "Swap Right"       l "swap-pane -R" \
  "" \
  "Zoom"             z "resize-pane -Z" \
  "Mark"             m "select-pane -m"

# -- plugins -------------------------------------------------------------------

# -- status bar (Catppuccin Mocha) -------------------------------------------
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_left_separator ' '
set -g @catppuccin_window_middle_separator ' '
set -g @catppuccin_window_right_separator ' #[bg=#11111b] '
set -g @catppuccin_window_current_left_separator ' '
set -g @catppuccin_window_current_middle_separator ' '
set -g @catppuccin_window_current_right_separator ' #[bg=#11111b] '
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Active window colors - make current tab more visible
set -g @catppuccin_window_current_number_color '#89dceb'
# Inactive window colors - darker number portion with white text
set -g @catppuccin_window_number_color '#45475a'  # surface_1 - darker than title but visible
set -g @catppuccin_window_text_color '#313244'
# Override background to pitch black (#11111b)
set -g @catppuccin_status_background '#11111b'

set -g @catppuccin_directory_text ' #{b:pane_current_path}'
# Configure directory and host modules
set -g @catppuccin_directory_color '#89b4fa'
set -g @catppuccin_host_color '#89dceb'
set -g @catppuccin_host_text ' #h'


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Status bar -- set AFTER tpm so catppuccin color vars are resolved
# ---------------------------------------------------------------------------

# -- Pane borders (re-assert after plugin overrides) -----------------------
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'
set -g status-style 'bg=#11111b'
set -g status-bg '#11111b'
set -g status-left-length 200
set -g status-right-length 300
set -g status-position top
# -- Messages ---------------------------------------------------------------
set -g message-style 'fg=#cdd6f4,bg=#313244'
set -g message-command-style 'fg=#cdd6f4,bg=#313244'

set -g status-left "\
#[fg=#181825,bg=#{?#{==:#{client_key_table},prefix},#f9e2af,#{?#{==:#{client_key_table},copy-mode},#a6e3a1,#89dceb}},bold] #{?#{==:#{client_key_table},prefix},PREFIX,#{?#{==:#{client_key_table},copy-mode},COPY,NORMAL}} \
#[fg=#{?#{==:#{client_key_table},prefix},#f9e2af,#{?#{==:#{client_key_table},copy-mode},#a6e3a1,#89dceb}},bg=#89b4fa]\
#[fg=#181825,bg=#89b4fa]  #S \
#[fg=#89b4fa,bg=#11111b]\
 "

set -g window-status-separator ''
set -g window-status-format "#[fg=#6c7086,bg=#11111b] #I: #W #[fg=#45475a,bg=#11111b]|"
set -g window-status-current-format "#[fg=#181825,bg=#89dceb] #I #[fg=#cdd6f4,bg=#11111b] #W #[fg=#45475a,bg=#11111b]|"

set -g @show_sys_stats 1

bind M if-shell '[ -n "$(tmux show-option -gqv @show_sys_stats)" ]' \
  'set -g @show_sys_stats "" ; display "sys stats: hidden"' \
  'set -g @show_sys_stats 1  ; display "sys stats: visible"'

set -g status-right "\
#{?#{@show_sys_stats},#[fg=#cdd6f4,bg=#11111b],#[fg=#11111b,bg=#11111b]}  #(~/dotfiles/bin/tmux-mem.sh) #{?#{@show_sys_stats},#[fg=#cdd6f4,bg=#11111b],#[fg=#11111b,bg=#11111b]}  #(~/dotfiles/bin/tmux-cpu.sh) \
#[bg=#11111b]#[fg=#89b4fa]#[fg=#181825,bg=#89b4fa]  #{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}} \
#[fg=#89dceb,bg=#89b4fa]#[fg=#181825,bg=#89dceb,bold]  #h \
"
