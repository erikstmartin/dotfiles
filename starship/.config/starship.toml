add_newline = false
# A minimal left prompt
format = """$directory$character"""
palette = "catppuccin_mocha"
# move the rest of the prompt to the right
right_format = """$all"""
command_timeout = 1000

[aws]
disabled = true
style = 'bold blue'
symbol = " "

[conda]
ignore_base = true

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'
vimcmd_symbol = '[❮](mauve)'

[cmd_duration]
min_time = 2_000
format = '[$duration](yellow) '
show_milliseconds = false

[git_branch]
symbol = ' '
style = 'bold mauve'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'dimmed white'
ahead = '[⇡${count}](teal)'
behind = '[⇣${count}](yellow)'
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](red)'
conflicted = '[~${count}](bold red)'
untracked = '[?${count}](blue)'
stashed = '[*](mauve)'
modified = '[!${count}](yellow)'
staged = '[+${count}](green)'
renamed = '[»${count}](peach)'
deleted = '[✘${count}](red)'
[golang]
symbol = ' '
[kubernetes]
symbol = '☸  '
disabled = false
detect_files = []
detect_extensions = []
detect_folders = ['k8s', 'kubernetes', 'helm', 'charts']

